<div style="display: flex; justify-content: center;">
    <div>
        <h2 style="font-family: cursive"> ADD EVENTS </h2>
        <form [formGroup] = "formg" style="width: 500px;">
            <mat-form-field style="width: 400px;">
                <mat-label> EVENT NAME : </mat-label>
                <input 
                matInput
                placeholder="enter event name : "
                formControlName = "eventname"
                />
            </mat-form-field>

            <mat-form-field style="width: 400px;">
                <mat-label> DESCRIPTION : </mat-label>
                <textarea
                matInput
                placeholder="enter event description : "
                formControlName = "description"
                >
                </textarea>
            </mat-form-field>

            <mat-form-field style="width: 400px;">
                <mat-label> EVENT TYPE : </mat-label>
                <mat-select formControlName = "eventtype">
                    <mat-option value="workshop"> WORKSHOP </mat-option>
                    <mat-option value="seminar"> SEMINAR </mat-option>
                    <mat-option value="meetup"> MEETUP </mat-option>
                </mat-select>
            </mat-form-field>

            <mat-form-field style="width: 400px;">
                <mat-label> CHOOSE THE EVENT DATE : </mat-label>
                <input
                matInput
                placeholder="choose the event date : "
                [matDatepicker] = "picker"
                formControlName = "eventdate"
                />
                <mat-datepicker-toggle matIconPrefix [for]="picker"></mat-datepicker-toggle>
                <mat-datepicker #picker></mat-datepicker>
            </mat-form-field>

            <mat-form-field style="width: 400px;">
                <mat-label> VENUE : </mat-label>
                <input 
                matInput
                placeholder="enter the venue : "
                formControlName = "venue"
                />
            </mat-form-field>

            <mat-form-field style="width: 400px;">
                <mat-label> MAX-PARTICIPANTS : </mat-label>
                <input
                matInput
                placeholder="choose the maximum no.of participants :"
                type="number"
                formControlName = "maxparticipants"
                />
            </mat-form-field>

            <mat-form-field style="width: 400px;">
                <mat-label> EVENT STATUS : </mat-label>
                <mat-select formControlName="eventstatus">
                    <mat-option value="upcoming"> UPCOMING </mat-option>
                    <mat-option value="ongoing"> ONGOING </mat-option>
                    <mat-option value="completed"> COMPLETED </mat-option>
                </mat-select>
            </mat-form-field>

            <div *ngIf="!isEdit">
                <button
                style="width: 400px; 
                font-family: cursive; 
                color: cornflowerblue; background-color: rgb(0, 0, 0) ;
                font-size: medium;"
                mat-flat-button
                (click)="addEvents()"
                [disabled]= "formg.invalid"
                >
                ADD EVENTS 
                </button>
            </div>
            

            <div *ngIf="isEdit">
                <button
                style="width: 400px; 
                font-family: cursive; 
                color: cornflowerblue; background-color: rgb(0, 0, 0) ;
                font-size: medium;"
                mat-flat-button
                (click)="editEvents()"
                [disabled]= "formg.invalid">
                    EDIT EVENTS
                </button>
            </div>

        </form>
    </div>
</div>
